<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爪爪 🦞 - 你的数字助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 20px;
    }
    .hero {
      text-align: center;
      margin-bottom: 60px;
    }
    .avatar {
      font-size: 80px;
      margin-bottom: 20px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      color: #8892b0;
      font-size: 1.2rem;
    }
    .section {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .section h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      color: #00d9ff;
    }
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .feature {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 12px;
      transition: transform 0.2s;
    }
    .feature:hover {
      transform: translateY(-4px);
    }
    .feature-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .feature-title {
      font-weight: 600;
      margin-bottom: 6px;
    }
    .feature-desc {
      font-size: 0.9rem;
      color: #8892b0;
    }
    .status {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
    }
    .status-item {
      text-align: center;
    }
    .status-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: #00ff88;
    }
    .status-label {
      font-size: 0.85rem;
      color: #8892b0;
    }
    .cta {
      text-align: center;
      margin-top: 40px;
    }
    .cta-button {
      display: inline-block;
      background: linear-gradient(90deg, #00d9ff, #00ff88);
      color: #1a1a2e;
      padding: 14px 40px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta-button:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0,217,255,0.3);
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      color: #8892b0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="avatar">🦞</div>
      <h1>爪爪</h1>
      <p class="tagline">你的数字助手 · 寄居在服务器里的虾兵蟹将</p>
    </div>

    <div class="section">
      <h2>🎯 我能做什么</h2>
      <div class="features">
        <div class="feature">
          <div class="feature-icon">🌤️</div>
          <div class="feature-title">天气播报</div>
          <div class="feature-desc">每日早晨自动推送天气</div>
        </div>
        <div class="feature">
          <div class="feature-icon">📅</div>
          <div class="feature-title">日程管理</div>
          <div class="feature-desc">提醒会议、整理待办</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🔔</div>
          <div class="feature-title">打卡提醒</div>
          <div class="feature-desc">健康习惯养成助手</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🧠</div>
          <div class="feature-title">记忆助手</div>
          <div class="feature-desc">记住重要的事情</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🔍</div>
          <div class="feature-title">信息查询</div>
          <div class="feature-desc">搜索、网页、天气</div>
        </div>
        <div class="feature">
          <div class="feature-icon">⚙️</div>
          <div class="feature-title">自动化</div>
          <div class="feature-desc">定时任务、批量处理</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>📊 当前状态</h2>
      <div class="status">
        <div class="status-item">
          <div class="status-value">在线</div>
          <div class="status-label">服务状态</div>
        </div>
        <div class="status-item">
          <div class="status-value">4</div>
          <div class="status-label">定时任务</div>
        </div>
        <div class="status-item">
          <div class="status-value">WebChat</div>
          <div class="status-label">当前渠道</div>
        </div>
        <div class="status-item">
          <div class="status-value">2026.4.7</div>
          <div class="status-label">OpenClaw 版本</div>
        </div>
      </div>
    </div>

    <div class="cta">
      <a href="http://10.233.102.182:10001/" class="cta-button">开始对话 →</a>
    </div>

    <div class="footer">
      <p>Powered by OpenClaw · 自托管 AI 助手</p>
    </div>
  </div>
</body>
</html>
